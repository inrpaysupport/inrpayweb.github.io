<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>INRPay</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="auth">
<h2>INRPay</h2>

<input id="name" placeholder="Name (register)">
<input id="number" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Create Account</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="topbar">
<div>
<p>Welcome 👋</p>
<h2 id="username"></h2>
</div>

<div class="top-right">
<span onclick="logout()">🚪</span>
</div>
</div>

<div class="card">
<p>Wallet Balance</p>
<h1 id="balance">₹0</h1>

<div class="btns">
<button class="withdraw">Withdraw</button>
</div>
</div>

<div class="stats">
<div>₹0<br>Rewards</div>
<div>0<br>Referrals</div>
<div>0<br>Pending</div>
</div>

<h3>SERVICES</h3>

<div class="services">
<div>Bank Account</div>
<div onclick="deposit()">Security Deposit</div>
<div>Telegram</div>
<div>History</div>
<div>Reward</div>
<div onclick="openSupport()">Support</div>
</div>

</div>

<!-- SUPPORT POPUP -->
<div id="supportBox" class="popup">
<div class="popup-box">
<h3>Support</h3>

<button onclick="autoReply()">Contact Customer Representative</button>

<p id="supportMsg"></p>

<button onclick="closeSupport()">Close</button>
</div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
