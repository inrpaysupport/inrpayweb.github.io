<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>INRPay</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div id="auth">

<h1 class="appLogo">INRPAY</h1>
<h2 id="authTitle">Create Account</h2>

<input id="name" placeholder="Name">
<input id="number" placeholder="Mobile Number" maxlength="10">

<div class="passwordBox">
<input id="password" type="password" placeholder="Password">
<span onclick="togglePass()" class="eyeIcon">👁</span>
</div>

<button id="registerBtn" onclick="register()">Sign Up</button>
<button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

<p id="toggleText">
Already have account? <span onclick="showLogin()">Sign In</span>
</p>

<p id="forgotText" style="display:none;">Forgot Password?</p>

</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="homePage" class="page">

<h2 id="usernameHome"></h2>

<div class="card">
<h1 id="balance">₹0</h1>
</div>

<div class="services">
<div onclick="deposit()">Security Deposit</div>
<div onclick="openBank()">Add Bank Account</div>
</div>

<div class="card">
<div class="txRow">
<div>Account Bind</div>
<div class="txRight">
<div class="dot red"></div>
<div>Deactivate</div>
</div>
</div>
</div>

<div class="card">
<div class="txRow">
<div>Transactions</div>
<div>No data</div>
</div>
</div>

</div>

<!-- EARN -->
<div id="earnPage" class="page" style="display:none;">
<h3>Earnings</h3>
<div id="earningList" class="scrollArea"></div>
<button onclick="openWithdraw()">Withdraw</button>
</div>

<!-- SETTINGS -->
<div id="settingsPage" class="page" style="display:none;">
<p id="username2"></p>
<p id="usernumber"></p>
<p id="userid"></p>

<input id="oldPass" placeholder="Old Password">
<input id="newPass" placeholder="New Password">
<input id="confirmPass" placeholder="Confirm Password">

<button onclick="changePassword()">Update Password</button>
<button onclick="logout()">Logout</button>
</div>

<!-- NAV -->
<div class="bottomNav">
<div onclick="showPage('homePage')">🏠</div>
<div onclick="showPage('earnPage')">💰</div>
<div onclick="showPage('settingsPage')">⚙️</div>
</div>

</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">
<div class="popup-box">
<h3>Security Deposit</h3>
<input id="utr" placeholder="Enter UTR">
<button onclick="submitDeposit()">Submit</button>
<div id="depositList"></div>
<button onclick="closeDeposit()">Close</button>
</div>
</div>

<!-- BANK -->
<div id="bankBox" class="popup">
<div class="popup-box">
<h3>Add Bank</h3>
<input id="bankName" placeholder="Bank Name">
<input id="bankAcc" placeholder="Account Number">
<input id="bankIfsc" placeholder="IFSC Code">
<button onclick="saveBank()">Save</button>
<div id="bankList"></div>
<button onclick="closeBank()">Close</button>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">
<div class="popup-box">
<h2>Withdraw</h2>

<input id="wAmount" placeholder="Amount ₹">
<button onclick="submitWithdraw()">Withdraw</button>

<div id="withdrawList"></div>

<button onclick="closeWithdraw()">Close</button>
</div>
</div>

<!-- MESSAGE -->
<div id="msgBox" class="popup">
<div class="popup-box">
<p id="msgText"></p>
<button onclick="closeMsg()">OK</button>
</div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
