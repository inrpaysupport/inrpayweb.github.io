<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>INRPay</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div id="auth">

<h2 id="authTitle">Create Account</h2>

<input id="name" placeholder="Name">
<input id="number" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">

<button id="registerBtn" onclick="register()">Sign Up</button>
<button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

<p id="toggleText">
Already have account? <span onclick="showLogin()">Sign In</span>
</p>

<p id="forgotText" onclick="openForgot()" style="display:none;">Forgot Password?</p>

</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- HOME -->
<div id="homePage" class="page">

<h2 id="usernameHome"></h2>

<div class="card">
<h1 id="balance">₹0</h1>
</div>

<div class="services">
<div onclick="deposit()">Security Deposit</div>
<div onclick="openBank()">Add Bank</div>
</div>

<div class="card">
<div class="txRow">
<div class="txTitle">Account Bind</div>

<div class="txRight">
<span class="dot red"></span>
<span id="txStatus">Deactivate</span>
</div>
</div>
</div>

</div>

<!-- EARN -->
<div id="earnPage" class="page" style="display:none;">
<h3>Earnings</h3>

<div class="scrollArea">
<div id="earningList"></div>
</div>

<button onclick="openWithdraw()">Withdraw</button>
</div>

<!-- SETTINGS -->
<div id="settingsPage" class="page" style="display:none;">
<p id="username2"></p>
<p id="usernumber"></p>

<input id="oldPass" placeholder="Old Password">
<input id="newPass" placeholder="New Password">
<input id="confirmPass" placeholder="Confirm Password">

<button onclick="changePassword()">Change Password</button>
<button onclick="logout()">Logout</button>
</div>

<!-- NAV -->
<div class="bottomNav">
<div onclick="showPage('homePage')">🏠</div>
<div onclick="showPage('earnPage')">💰</div>
<div onclick="showPage('settingsPage')">⚙️</div>
</div>

</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">
<div class="popup-box">
<input id="utr" placeholder="UTR">
<button onclick="submitDeposit()">Submit</button>
<div id="depositList"></div>
<button onclick="closeDeposit()">Close</button>
</div>
</div>

<!-- BANK -->
<div id="bankBox" class="popup">
<div class="popup-box">
<input id="bankName" placeholder="Bank">
<input id="accNumber" placeholder="Account">
<button onclick="saveBank()">Add</button>
<div id="bankList"></div>
<button onclick="closeBank()">Close</button>
</div>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">
<div class="popup-box withdrawUI">

<h2 class="center">Withdraw</h2>

<div class="withdrawCard">
<div class="row space">
<h3>Settlement Account</h3>
<span onclick="editAccount()">✏️</span>
</div>

<p>Account Name</p>
<h4 id="accNameShow">---</h4>

<p>Account Number</p>
<h4 id="accNumberShow">---</h4>

<p>IFSC</p>
<h4 id="ifscShow">---</h4>
</div>

<div class="profitBox">
Profit Withdrawable ₹<span id="profit">0</span>
</div>

<div class="withdrawForm">
<input id="wAmount" placeholder="Withdrawal Amount (₹)">
<p class="min">Minimum ₹200</p>
<button onclick="submitWithdraw()">Submit Withdrawal</button>
</div>

<p class="viewHistory" onclick="loadWithdraw()">View Withdrawal Records</p>

<div id="withdrawList" class="scrollArea"></div>

<button onclick="closeWithdraw()">Close</button>

</div>
</div>

<!-- MESSAGE -->
<div id="msgBox" class="popup">
<div class="popup-box">
<p id="msgText"></p>
<button onclick="closeMsg()">OK</button>
</div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
