<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INRPAY</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h1>INRPAY</h1>
<h2 id="authTitle">Create Account</h2>

<input id="name" placeholder="Name">
<input id="number" placeholder="Mobile Number">

<div class="passwordBox">
<input id="password" type="password" placeholder="Password">
<span onclick="togglePass()">👁</span>
</div>

<button id="registerBtn" onclick="register()">Sign Up</button>
<button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

<p>
<span id="toggleMsg">Already have account?</span>
<button onclick="toggleAuth()">Sign In</button>
</p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="notice">
<span id="noticeText">Loading...</span>
</div>

<div class="card">
<h2 id="usernameHome"></h2>
<h1 id="balance">₹0</h1>
</div>

<div class="account-bind-box">
<div onclick="deposit()">Security Deposit</div>
<div onclick="openBank()">Add Bank</div>
</div>

<div class="card">
<div class="txRow">
<div>Account Bind</div>
<div class="txRight">
<div class="dot red"></div>
<div>Deactivate</div>
</div>
</div>
</div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
