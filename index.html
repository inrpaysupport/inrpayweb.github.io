<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>INRPay</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div id="auth">

<h1 class="appLogo">INRPAY</h1>

<h2 id="authTitle">Create Account</h2>

<input id="name" placeholder="Name">

<input id="number" placeholder="Mobile Number" maxlength="10" inputmode="numeric">

<!-- PASSWORD FIX -->
<div class="passwordBox">
  <input id="password" type="password" placeholder="Password">
  <span onclick="togglePass()" class="eyeIcon">👁</span>
</div>

<button id="registerBtn" onclick="register()">Sign Up</button>
<button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

<p id="toggleText">
Already have account? <span onclick="showLogin()">Sign In</span>
</p>

<p id="forgotText" style="display:none;">Forgot Password?</p>

</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="homePage" class="page">

<h2 id="usernameHome"></h2>

<div class="card">
<h1 id="balance">₹0</h1>
</div>

<div class="services">
<div onclick="deposit()">Security Deposit</div>
<div onclick="openBank()">Add Bank Account</div>
</div>

<!-- ACCOUNT BIND -->
<div class="card">
<div class="txRow">
<div>Account Bind</div>
<div class="txRight">
<div class="dot red"></div>
<div>Deactivate</div>
</div>
</div>
</div>

<!-- TRANSACTION -->
<div class="card">
<div class="txRow">
<div>Transactions</div>
<div>No data</div>
</div>
</div>

</div>

<!-- EARN -->
<div id="earnPage" class="page" style="display:none;">
<h3>Earnings</h3>
<div id="earningList" class="scrollArea"></div>
<button onclick="openWithdraw()">Withdraw</button>
</div>

<!-- SETTINGS -->
<div id="settingsPage" class="page" style="display:none;">
<p id="username2"></p>
<p id="usernumber"></p>
<p id="userid"></p>

<input id="oldPass" placeholder="Old Password">
<input id="newPass" placeholder="New Password">
<input id="confirmPass" placeholder="Confirm Password">

<button onclick="changePassword()">Update Password</button>
<button onclick="logout()">Logout</button>
</div>

<!-- NAV -->
<div class="bottomNav">
<div onclick="showPage('homePage')">🏠</div>
<div onclick="showPage('earnPage')">💰</div>
<div onclick="showPage('settingsPage')">⚙️</div>
</div>

</div>

<!-- WITHDRAW -->
<div id="withdrawBox" class="popup">
<div class="popup-box">

<h2>Withdraw</h2>

<div class="withdrawCard">
<h3>Settlement Account</h3>

<input id="accNameInput" placeholder="Account Name">
<input id="accNumberInput" placeholder="Account Number">
<input id="ifscInput" placeholder="IFSC Code">

<button onclick="saveAccount()">Save</button>
</div>

<input id="wAmount" placeholder="Amount ₹">
<p>Minimum ₹200</p>

<button onclick="submitWithdraw()">Withdraw</button>

<div id="withdrawList" class="scrollArea"></div>

<button onclick="closeWithdraw()">Close</button>

</div>
</div>

<!-- MESSAGE -->
<div id="msgBox" class="popup">
<div class="popup-box">
<p id="msgText"></p>
<button onclick="closeMsg()">OK</button>
</div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
