<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INRPAY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Create Account</h2>
    <input id="name" placeholder="Name">
    <input id="number" placeholder="Mobile Number" maxlength="10">
    <div class="passwordBox">
        <input id="password" type="password" placeholder="Password">
        <span onclick="togglePass()" class="eyeIcon">👁</span>
    </div>
    <button id="registerBtn" onclick="register()">Sign Up</button>
    <button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>
    <p id="toggleText">Already have account? <button class="linkBtn" onclick="showLogin()">Sign In</button></p>
</div>

<div id="app" style="display:none;">
    <div class="notice"><span id="scrollingNotice">Loading news...</span></div>

    <div style="text-align: center; margin: 10px 0;">
        <button onclick="openSupport()" class="support-btn">🎧 Customer Support</button>
    </div>

    <div id="homePage" class="page">
        <h2 id="usernameHome" style="padding-left:15px;"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>

        <div class="account-bind-box">
            <div onclick="deposit()">Security Deposit</div>
            <div onclick="openBank()">Add Bank Account</div>
        </div>

        <div class="card">
            <div class="txRow" style="display:flex; justify-content:space-between; align-items:center;">
                <div>Account Bind</div>
                <div class="txRight" style="display:flex; align-items:center; gap:8px;">
                    <div class="dot red"></div>
                    <div style="color:#ff4d4d; font-weight:bold;">Deactivate</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="txRow">
                <div>Transactions</div>
                <div style="margin-top:35px; color:#bbb; text-align:center;">No data available</div>
            </div>
        </div>
    </div>

    <div id="earnPage" class="page" style="display:none;">
        <h3 style="text-align:center;">Earnings</h3>
        <p style="text-align:center;">Total Balance: ₹<span id="earnBalance">0</span></p>
        <button onclick="openWithdraw()" style="width:80%; display:block; margin:auto;">Withdraw</button>
    </div>

    <div id="settingsPage" class="page" style="display:none; text-align:center;">
        <p id="username2"></p>
        <button onclick="logout()" style="background:red; color:white;">Logout</button>
    </div>

    <div class="bottomNav">
        <div onclick="showPage('homePage')">🏠</div>
        <div onclick="showPage('earnPage')">💰</div>
        <div onclick="showPage('settingsPage')">⚙️</div>
    </div>
</div>

<div id="depositBox" class="popup">
    <div class="popup-box" style="text-align:center;">
        <h2 id="amountText">₹1000</h2>
        <img id="qrImage">
        <p id="upiText" style="font-weight:bold; color:#6a11cb;"></p>
        <input id="utr" placeholder="Enter UTR Number">
        <button onclick="submitDeposit()" style="background:green; color:white; width:100%;">Submit</button>
        <button onclick="closeDeposit()" style="width:100%; margin-top:5px;">Close</button>
    </div>
</div>

<div id="supportBox" class="popup">
    <div class="popup-box">
        <h3 style="text-align:center;">Help Center</h3>
        <button onclick="supportMsg('rep')" style="width:100%; margin:5px 0;">1. Contact Representative</button>
        <button onclick="supportMsg('man')" style="width:100%; margin:5px 0;">2. Contact Manager</button>
        <button onclick="closeSupport()" style="width:100%; background:#eee; color:black; margin-top:10px;">Back</button>
    </div>
</div>

<div id="msgBox" class="popup"><div class="popup-box"><p id="msgText"></p><button onclick="closeMsg()">OK</button></div></div>

<script type="module" src="script.js"></script>
</body>
</html>
