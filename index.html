<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>INRPay</title>
<link rel="stylesheet" href="style.css?v=20">
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
<h1 class="logo">INRPAY</h1>
</div>

<!-- 🔐 AUTH -->
<div id="auth">

<h2 id="authTitle">Create Account</h2>

<input id="name" placeholder="Name">
<input id="number" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">

<button id="registerBtn" onclick="register()">Sign Up</button>
<button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

<p id="toggleText">
Already have account? <span onclick="showLogin()">Sign In</span>
</p>

</div>

<!-- 📱 APP -->
<div id="app">

<!-- 🏠 HOME -->
<div id="homePage" class="page">

<h2 class="title">INRPAY</h2>

<div class="card mainCard">
<h1 id="balance">₹0</h1>

<div class="row">
<div>Deposit<br><span id="depositTotal">0</span></div>
<div>Earnings<br><span id="earnings">0</span></div>
</div>

<p class="green">Cashed Out: ₹0</p>
</div>

<div class="services">
<div onclick="deposit()">💳 Deposit</div>
<div onclick="openBank()">🏦 Bank</div>
</div>

</div>

<!-- ⚙️ SETTINGS -->
<div id="settingsPage" class="page" style="display:none;">

<h2 class="title">Settings</h2>

<div class="card">
<p id="username2"></p>
<p id="usernumber"></p>
</div>

<div class="card">
<input id="newPass" placeholder="New Password">
<input id="confirmPass" placeholder="Confirm Password">
<button onclick="changePassword()">Update</button>
</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<!-- 🔻 NAV -->
<div class="bottomNav">
<div onclick="showPage('homePage')">🏠</div>
<div onclick="showPage('settingsPage')">⚙️</div>
</div>

</div>

<!-- 💳 DEPOSIT POPUP -->
<div id="depositBox" class="popup">
<div class="popup-box">

<h3>Deposit ₹1000</h3>

<img id="qrImg" width="150">
<p id="upiText"></p>

<input id="utr" placeholder="Enter UTR">
<button onclick="submitDeposit()">Submit</button>

<div id="depositList"></div>

<button onclick="closeDeposit()">Close</button>

</div>
</div>

<!-- 🏦 BANK POPUP -->
<div id="bankBox" class="popup">
<div class="popup-box">

<h3>Bank Accounts</h3>

<div id="bankList"></div>

<input id="accNumber" placeholder="Account">
<input id="bankName" placeholder="Bank">

<button onclick="saveBank()">Add</button>
<button onclick="closeBank()">Close</button>

</div>
</div>

<!-- MESSAGE -->
<div id="msgBox" class="popup">
<div class="popup-box">
<p id="msgText"></p>
<button onclick="closeMsg()">OK</button>
</div>
</div>

<script type="module" src="script.js?v=20"></script>

</body>
</html>
