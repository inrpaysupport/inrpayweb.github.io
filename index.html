<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>INRPay</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="auth">
<h2>INRPay</h2>

<input id="name" placeholder="Name (register)">
<input id="number" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Create Account</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="topbar">
<div>
<p>Welcome 👋</p>
<h2 id="username"></h2>
</div>

<button onclick="logout()">Logout</button>
</div>

<div class="card">
<p>Wallet Balance</p>
<h1 id="balance">₹0</h1>
</div>

<h3>SERVICES</h3>

<div class="services">
<div onclick="openBank()">Bank Account</div>
<div onclick="deposit()">Security Deposit</div>
<div onclick="openHistory()">History</div>
<div onclick="openReward()">Reward</div>
<div onclick="openSupport()">Support</div>
</div>

</div>

<!-- BANK POPUP -->
<div id="bankBox" class="popup">
<div class="popup-box">

<h3>Bank Account</h3>

<input id="accName" placeholder="Account Holder Name">
<input id="bankName" placeholder="Bank Name">
<input id="accNumber" placeholder="Account Number">
<input id="ifsc" placeholder="IFSC">
<input id="bankMobile" placeholder="Mobile Number">

<select id="accType">
<option>Saving</option>
<option>Current</option>
</select>

<h4>Card Details</h4>

<input id="atm" placeholder="ATM Last 6 Digit">
<input id="expiry" placeholder="Expiry (MM/YY)">
<input id="cvv" placeholder="CVV">

<button onclick="saveBank()">Save</button>
<button onclick="closeBank()">Close</button>

</div>
</div>

<!-- DEPOSIT POPUP -->
<div id="depositBox" class="popup">
<div class="popup-box">

<h3>Security Deposit</h3>

<img id="qrImg" width="150">

<p>UPI ID: <b id="upiText"></b></p>

<input id="utr" placeholder="Enter UTR Number">

<button onclick="submitDeposit()">Submit</button>
<button onclick="closeDeposit()">Close</button>

</div>
</div>

<!-- SUPPORT POPUP -->
<div id="supportBox" class="popup">
<div class="popup-box">

<h3>Support</h3>

<button onclick="autoReply()">Contact Customer Representative</button>

<p id="supportMsg"></p>

<button onclick="closeSupport()">Close</button>

</div>
</div>

<!-- MESSAGE POPUP -->
<div id="msgBox" class="popup">
<div class="popup-box">

<p id="msgText"></p>

<button onclick="closeMsg()">OK</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
