<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INRPAY</title>
    <link rel="stylesheet" href="style.css">
    <style>
        input, .passwordBox {
            width: 85% !important;
            margin: 10px auto !important;
            display: block !important;
        }
        .passwordBox { position: relative; }
        .passwordBox input { width: 100% !important; margin: 0 !important; }
        .popup { z-index: 9999 !important; }
        .bottomNav { 
            z-index: 1000 !important; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            background: #111; 
            padding: 12px 0; 
            text-align: center;
        }
        .bottomNav div { cursor: pointer; color: white; font-size: 12px; }
        .no-data-box { text-align: center; padding: 20px; color: #ccc; font-style: italic; font-size: 13px; }

        .refer-box { 
            background: linear-gradient(45deg, #6a11cb, #2575fc); 
            border-radius: 12px; padding: 20px; margin: 15px; text-align: center; color: white;
        }
        .history-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin: 15px; }
        
        /* Deposit History in Popup */
        #depositHistory { max-height: 150px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        .dep-hist-item { font-size: 11px; text-align: left; padding: 8px; border-bottom: 1px solid #333; color: #eee; line-height: 1.4; }
        
        .flex-row { display: flex; gap: 5px; width: 90%; margin: 0 auto; }
        .flex-row input { margin: 5px 0 !important; font-size: 12px; padding: 8px; }
    </style>
</head>
<body>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Create Account</h2>
    <input id="name" placeholder="Name">
    <input id="number" placeholder="Mobile Number" maxlength="10">
    <input id="email" placeholder="Email Address">
    <div class="passwordBox">
        <input id="password" type="password" placeholder="Password">
        <span onclick="togglePass()" class="eyeIcon">👁</span>
    </div>
    <button id="registerBtn" onclick="register()">Sign Up</button>
    <button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>
    <p id="toggleText">Already have account? <button class="linkBtn" onclick="showLogin()">Sign In</button></p>
</div>

<div id="app" style="display:none;">
    <div class="notice"><span id="scrollingNotice">Loading notice...</span></div>

    <div id="homePage" class="page">
        <h2 id="usernameHome" style="padding-left:15px;"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>
        <div class="card" onclick="deposit()" style="background: rgba(255,255,255,0.1); cursor:pointer; text-align:center;">
            <h3 style="margin:0;">🛡️ Security Deposit</h3>
        </div>
        <div class="card">
            <h4 style="margin:0 0 10px 0;">Recent Transactions</h4>
            <div class="no-data-box">No data available</div>
        </div>
    </div>

    <div id="earningPage" class="page" style="display:none;">
        <div class="refer-box">
            <h3 style="margin: 0;">🎁 Refer & Earn</h3>
            <p style="font-size: 13px; margin: 10px 0;">Share and get ₹50 on every referral!</p>
            <button onclick="shareReferLink()" style="background: white; color: #6a11cb; font-weight: bold; width: 90%; border-radius: 8px; padding: 12px; border: none;">📲 Share Link</button>
        </div>

        <div class="history-card">
            <h3 style="margin-top:0;">Referral History</h3>
            <div id="referralList">
                <div class="no-data-box">No referrals found</div>
            </div>
        </div>
    </div>

    <div id="settingsPage" class="page" style="display:none; text-align:center;">
        <div class="card">
            <p id="username2" style="font-weight:bold;"></p>
            <p id="userid" style="color: #00d4ff; font-weight: bold;"></p>
        </div>
        <button onclick="logout()" style="background:red; color:white; width:90%; margin-top:20px; border:none; padding:12px; border-radius:8px;">Logout</button>
    </div>

    <div class="bottomNav">
        <div onclick="showPage('homePage')">🏠<br>Home</div>
        <div onclick="showPage('earningPage')">💰<br>Earning</div>
        <div onclick="showPage('settingsPage')">⚙️<br>Settings</div>
    </div>
</div>

<div id="depositBox" class="popup">
    <div class="popup-box" style="text-align:center; max-height: 85vh; overflow-y: auto;">
        <h2 id="amountText">₹0</h2>
        <div id="qrContainer">
            <img id="qrImage" src="" style="width: 180px; height: 180px; margin: 10px auto; display:none; border: 1px solid #eee;">
        </div>
        <p id="upiText" style="font-weight:bold; font-size:14px;"></p>
        <input id="utr" placeholder="Enter UTR Number">
        <button onclick="submitDeposit()" style="background:green; color:white; width:100%;">Submit UTR</button>
        
        <div id="depositHistory">
            <p style="font-size: 12px; color: #888; margin: 5px 0;">Submission History</p>
            <div id="depositHistoryList"></div>
        </div>

        <button onclick="closeDeposit()" style="width:100%; margin-top:10px;">Close</button>
    </div>
</div>

<div id="msgBox" class="popup">
    <div class="popup-box">
        <p id="msgText" style="text-align:center; font-weight:bold;"></p>
        <button onclick="closeMsg()" style="width:100%; background:#6a11cb; color:white; border:none; padding:10px; border-radius:8px;">OK</button>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
