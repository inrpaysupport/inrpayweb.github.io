<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INRPAY</title>
<link rel="stylesheet" href="style.css">
<style>
    input, .passwordBox { width: 85% !important; margin: 10px auto !important; display: block !important; }
    .passwordBox { position: relative; }
    .passwordBox input { width: 100% !important; margin: 0 !important; }
    .bottomNav { z-index: 1000 !important; display: flex; justify-content: space-around; background: #111; position: fixed; bottom: 0; width: 100%; padding: 15px 0; }
    .bottomNav div { cursor: pointer; font-size: 20px; }
    .page { padding-bottom: 80px; }
    .card input { color: black; }
</style>
</head>
<body>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Create Account</h2>
    <input id="name" placeholder="Name">
    <input id="number" placeholder="Mobile Number" maxlength="10">
    <div class="passwordBox">
        <input id="password" type="password" placeholder="Password">
        <span onclick="togglePass()" class="eyeIcon">👁</span>
    </div>
    <p id="forgotText" style="display:none; text-align:center; cursor:pointer;" onclick="showMsg('Contact admin to reset password')">Forgot Password?</p>
    <button id="registerBtn" onclick="register()" style="width:85%; background:#6a11cb; color:white; margin:10px auto; display:block;">Sign Up</button>
    <button id="loginBtn" onclick="login()" style="display:none; width:85%; background:#6a11cb; color:white; margin:10px auto; display:block;">Sign In</button>
    <p id="toggleText" style="text-align:center;">Already have account? <button class="linkBtn" onclick="showLogin()">Sign In</button></p>
</div>

<div id="app" style="display:none;">
    <div class="notice"><span id="scrollingNotice">Loading notice...</span></div>
    
    <div id="homePage" class="page">
        <h2 id="usernameHome" style="padding-left:15px;"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>
        
        <div class="card" onclick="deposit()" style="background:#4caf50; text-align:center; cursor:pointer;"><h3>🛡️ Security Deposit</h3></div>

        <div class="card">
            <h3>🏦 Profile Bank Account</h3>
            <input id="homeBankName" placeholder="Bank Name">
            <input id="homeBankAcc" placeholder="Account Number">
            <input id="homeBankIfsc" placeholder="IFSC Code">
            <button onclick="saveHomeBank()" style="background:#2196f3; color:white; width:100%;">Save Profile Bank</button>
        </div>
    </div>

    <div id="earningPage" class="page" style="display:none;">
        <div class="card">
            <h3>💰 Withdrawal Bank Details</h3>
            <input id="earnBankName" placeholder="Holder Name">
            <input id="earnBankAcc" placeholder="Account Number">
            <input id="earnBankIfsc" placeholder="IFSC Code">
            <button onclick="saveWithdrawBank()" style="background:#2b0a4a; color:white; width:100%;">Update Withdrawal Bank</button>
        </div>
        <div class="card">
            <h3>Request Withdrawal</h3>
            <input id="withdrawAmount" type="number" placeholder="Enter Amount (Min ₹100)">
            <button onclick="submitWithdraw()" style="background:#4caf50; color:white; width:100%;">Withdraw Now</button>
        </div>
    </div>

    <div id="settingsPage" class="page" style="display:none; text-align:center;">
        <div class="card"><p id="username2"></p><p id="usernumber"></p><p id="userid"></p></div>
        <div class="card">
            <h4>Change Password</h4>
            <input id="oldPass" type="password" placeholder="Old Password">
            <input id="newPass" type="password" placeholder="New Password">
            <button onclick="changePassword()" style="background:#6a11cb; color:white; width:100%;">Update Password</button>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="background:red; color:white; width:90%; margin-top:20px;">Logout</button>
    </div>

    <div class="bottomNav">
        <div onclick="showPage('homePage')">🏠</div>
        <div onclick="showPage('earningPage')">💰</div>
        <div onclick="showPage('settingsPage')">⚙️</div>
    </div>
</div>

<div id="depositBox" class="popup"><div class="popup-box" style="text-align:center;"><h2 id="amountText">₹1000</h2><img id="qrImage"><p id="upiText"></p><input id="utr" placeholder="UTR Number"><button onclick="submitDeposit()" style="background:green; color:white; width:100%;">Submit</button><button onclick="closeDeposit()" style="width:100%; margin-top:5px;">Close</button></div></div>
<div id="msgBox" class="popup"><div class="popup-box"><p id="msgText" style="text-align:center; font-weight:bold;"></p><button onclick="closeMsg()" style="width:100%; background:#6a11cb; color:white;">OK</button></div></div>

<script type="module" src="script.js"></script>
</body>
</html>
