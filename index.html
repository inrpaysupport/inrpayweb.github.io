<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INRPAY</title>
<link rel="stylesheet" href="style.css">
<style>
    /* Click block fix */
    .popup { z-index: 9999 !important; }
    .bottomNav { z-index: 1000 !important; }
    input, button { position: relative; z-index: 10; }
    
    /* Password box uniform size */
    .passwordBox, input {
        width: 85% !important;
        margin: 10px auto !important;
    }
    .passwordBox input { width: 100% !important; margin: 0 !important; }
</style>
</head>

<body>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Create Account</h2>
    <input id="name" placeholder="Name">
    <input id="number" placeholder="Mobile Number" maxlength="10">
    <div class="passwordBox">
        <input id="password" type="password" placeholder="Password">
        <span onclick="togglePass()" class="eyeIcon">👁</span>
    </div>
    <button id="registerBtn" onclick="register()">Sign Up</button>
    <button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>
    <p id="toggleText">Already have account? <button class="linkBtn" onclick="showLogin()">Sign In</button></p>
</div>

<div id="app" style="display:none;">
    <div class="notice"><span id="scrollingNotice">Loading notice...</span></div>
    
    <div style="text-align: center; margin: 10px 0;">
        <button onclick="openSupport()" class="support-btn" style="background:#ff9800; color:white; width:90%; padding:10px; border-radius:8px; border:none;">🎧 Customer Support</button>
    </div>

    <div id="homePage" class="page">
        <h2 id="usernameHome" style="padding-left:15px;"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>
        <div class="account-bind-box">
            <div onclick="deposit()">Security Deposit</div>
            <div onclick="openBank()">Add Bank Account</div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <span>Account Bind</span>
                <span style="color:red; font-weight:bold;">● Deactivate</span>
            </div>
        </div>
    </div>

    <div id="earnPage" class="page" style="display:none;">
        <h3 style="text-align:center;">Earnings</h3>
        <p style="text-align:center;">Balance: ₹<span id="earnBalance">0</span></p>
        <button onclick="openWithdraw()" style="width:80%; margin:auto; display:block;">Withdraw</button>
    </div>

    <div id="settingsPage" class="page" style="display:none; text-align:center;">
        <div class="card">
            <p id="username2" style="font-weight:bold;"></p>
            <p id="usernumber"></p>
            <p id="userid"></p>
        </div>
        <div class="card">
            <h4>Change Password</h4>
            <input id="oldPass" type="password" placeholder="Old Password">
            <input id="newPass" type="password" placeholder="New Password">
            <input id="confirmPass" type="password" placeholder="Confirm Password">
            <button onclick="changePassword()" style="background:#6a11cb; color:white; width:90%;">Update Password</button>
        </div>
        <button onclick="logout()" style="background:red; color:white; width:90%; margin-top:20px;">Logout</button>
    </div>

    <div class="bottomNav">
        <div onclick="showPage('homePage')">🏠</div>
        <div onclick="showPage('earnPage')">💰</div>
        <div onclick="showPage('settingsPage')">⚙️</div>
    </div>
</div>

<div id="depositBox" class="popup">
    <div class="popup-box" style="text-align:center;">
        <h2 id="amountText">₹1000</h2>
        <img id="qrImage" style="width:200px; height:200px; margin:10px 0;">
        <p id="upiText" style="font-weight:bold;"></p>
        <input id="utr" placeholder="Enter UTR Number">
        <button onclick="submitDeposit()" style="background:green; color:white; width:100%;">Submit UTR</button>
        <button onclick="closeDeposit()" style="width:100%; margin-top:5px;">Close</button>
    </div>
</div>

<div id="bankBox" class="popup">
    <div class="popup-box">
        <h3>Add Bank Account</h3>
        <input id="bankName" placeholder="Bank Name">
        <input id="bankAcc" placeholder="Account Number">
        <input id="bankIfsc" placeholder="IFSC Code">
        <button onclick="saveBank()" style="background:#2b0a4a; color:white; width:100%;">Save Bank</button>
        <button onclick="closeBank()" style="width:100%; margin-top:5px;">Cancel</button>
    </div>
</div>

<div id="supportBox" class="popup">
    <div class="popup-box">
        <h3>Customer Support</h3>
        <button onclick="supportMsg('rep')" style="width:100%; margin:5px 0;">Contact Representative</button>
        <button onclick="supportMsg('man')" style="width:100%; margin:5px 0;">Contact Manager</button>
        <button onclick="closeSupport()" style="width:100%; margin-top:10px;">Back</button>
    </div>
</div>

<div id="msgBox" class="popup">
    <div class="popup-box"><p id="msgText"></p><button onclick="closeMsg()">OK</button></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
