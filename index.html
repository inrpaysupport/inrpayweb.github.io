<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>INRPay</title>
</head>

<body>

<!-- LOGIN / REGISTER -->
<div id="authBox" class="auth">
    <h2>INRPay</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="register()">Create Account</button>
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="header">
    <h3>Welcome 👋</h3>
    <h1 id="userNameShow"></h1>
</div>

<div class="card">
    <p>Wallet Balance</p>
    <h1 id="balance">₹0</h1>

    <div class="btns">
        <button class="withdraw">Withdraw</button>
        <button class="deposit" onclick="openPopup()">Deposit</button>
    </div>
</div>

<div class="grid">
    <div onclick="openPopup()">Security Deposit</div>
    <div onclick="openSupport()">Support</div>
    <div onclick="logout()">Logout</div>
</div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">

<h3>INRPay Deposit</h3>

<p>
UPI: <b id="upiText">yourupi@okaxis</b>
<button onclick="copyUPI()">Copy</button>
</p>

<input type="number" id="amount" placeholder="Enter Amount">
<input type="text" id="utr" placeholder="Enter UTR">

<button onclick="submitDeposit()">Submit</button>
<button onclick="closePopup()">Close</button>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
