<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INRPAY - Email Setup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        input, .passwordBox { width: 85% !important; margin: 10px auto !important; display: block !important; }
        .popup { z-index: 9999 !important; }
        .bottomNav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; background: #111; padding: 12px 0; z-index: 1000; }
        .bottomNav div { cursor: pointer; color: white; font-size: 12px; text-align: center; }
        .forgot-link { color: white; font-size: 14px; margin-top: 10px; display: block; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth">
    <h2 id="authTitle">Login</h2>
    <input id="name" placeholder="Full Name" style="display:none;">
    <input id="number" type="number" placeholder="Mobile Number">
    <input id="email" type="email" placeholder="Email Address" style="display:none;"> <div class="passwordBox">
        <input id="password" type="password" placeholder="Password">
        <span class="eyeIcon" onclick="togglePass()">👁️</span>
    </div>
    <button id="loginBtn" onclick="login()">Login</button>
    <button id="registerBtn" onclick="register()" style="display:none;">Register</button>
    <p id="forgotText" class="forgot-link" onclick="showForgotPopup()">Forgot Password?</p>
    <p id="toggleText">Don't have an account? <button onclick="showRegister()" class="linkBtn">Register</button></p>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <h2>INRPAY</h2>
        <div class="balance-card">
            <p>Total Balance</p>
            <h1 id="userBalance">₹0</h1>
        </div>
    </div>

    <div id="settings" style="padding: 20px;">
        <h3>Account Details</h3>
        <p>Name: <span id="userNameDisplay">---</span></p>
        <p>Number: <span id="userNumDisplay">---</span></p>
        <p>Email: <span id="userEmailDisplay">---</span></p> <button onclick="logout()" style="background:red; color:white;">Logout</button>
    </div>

    <div class="bottomNav">
        <div onclick="showPage('home')">🏠<br>Home</div>
        <div onclick="showPage('settings')">⚙️<br>Settings</div>
    </div>
</div>

<div id="forgotBox" class="popup">
    <div class="popup-box">
        <h3>Reset Password</h3>
        <p style="font-size: 12px; color: gray;">Enter your registered mobile number to receive reset link on email.</p>
        <input id="forgotNum" type="number" placeholder="Mobile Number">
        <button onclick="sendResetLink()" style="background:#6a11cb; color:white; width:100%;">Send Link</button>
        <button onclick="get('forgotBox').classList.remove('active')" style="width:100%; margin-top:5px;">Cancel</button>
    </div>
</div>

<div id="msgBox" class="popup">
    <div class="popup-box">
        <p id="msgText"></p>
        <button onclick="closeMsg()">OK</button>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
