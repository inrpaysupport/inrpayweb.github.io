<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INRPAY</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Force hide name and email fields by default for Signin */
        #name, #email, #registerBtn { display: none !important; }
        
        input, .passwordBox { width: 85% !important; margin: 10px auto !important; display: block !important; }
        .passwordBox { position: relative; }
        .passwordBox input { width: 100% !important; margin: 0 !important; }
        .popup { z-index: 9999 !important; }
        .bottomNav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; background: #111; padding: 12px 0; z-index: 1000; }
        .bottomNav div { cursor: pointer; color: white; font-size: 12px; }
        .forgot-link { color: white; font-size: 14px; text-decoration: none; margin-top: 10px; display: block; text-align: center; cursor: pointer; }
        .refer-box { background: linear-gradient(45deg, #6a11cb, #2575fc); border-radius: 12px; padding: 20px; margin: 15px; text-align: center; }
        .flex-row { display: flex; gap: 5px; width: 90%; margin: 0 auto; }
        .flex-row input { margin: 5px 0 !important; font-size: 12px; padding: 8px; }
    </style>
</head>
<body>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Sign In</h2>
    
    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email Address">
    
    <input id="number" placeholder="Mobile Number" maxlength="10">
    <div class="passwordBox">
        <input id="password" type="password" placeholder="Password">
        <span onclick="togglePass()" class="eyeIcon">👁</span>
    </div>

    <button id="loginBtn" onclick="login()">Sign In</button>
    <button id="registerBtn" onclick="register()">Sign Up</button>
    
    <p id="forgotText" class="forgot-link" onclick="openForgotPopup()">Forgot Password?</p>
    <p id="toggleText">Don't have an account? <button class="linkBtn" onclick="showRegister()">Sign Up</button></p>
</div>

<div id="app" style="display:none;">
    <div class="notice"><span id="scrollingNotice">Loading notice...</span></div>

    <div id="homePage" class="page">
        <h2 id="usernameHome" style="padding-left:15px;"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>
        <div class="card" onclick="deposit()" style="background: rgba(255,255,255,0.1); cursor:pointer;"><h3 style="margin:0; text-align:center;">🛡️ Security Deposit</h3></div>
        <div class="card" onclick="openBank()" style="background: rgba(255,255,255,0.1); cursor:pointer;"><h3 style="margin:0; text-align:center;">🏦 Bind Bank Account</h3></div>
        <div class="card"><h4>Recent Transactions</h4><div style="text-align:center; padding:20px; color:#ccc;">No data available</div></div>
    </div>

    <div id="earningPage" class="page" style="display:none;">
        <div class="card">
            <h3>🏦 Bank & Withdrawal</h3>
            <div class="flex-row">
                <input id="earnBankName" placeholder="Bank">
                <input id="earnBankAcc" placeholder="A/C No">
                <input id="earnBankIfsc" placeholder="IFSC">
            </div>
            <button onclick="saveWithdrawBank()" style="background:#2b0a4a; color:white; width:90%; border-radius:5px; padding:10px;">Update Bank</button>
            <div style="display: flex; gap: 10px; width: 90%; margin: 10px auto;">
                <input id="withdrawAmount" type="number" placeholder="Min ₹100" style="flex:2;">
                <button onclick="submitWithdraw()" style="background:#4caf50; color:white; flex:1; border-radius:10px;">Withdraw</button>
            </div>
        </div>
        <div class="refer-box">
            <h3>🎁 Refer & Earn</h3>
            <button onclick="shareReferLink()" style="background:white; color:#6a11cb; width:90%; border-radius:8px; font-weight:bold; padding:12px;">📲 Share Link</button>
        </div>
    </div>

    <div id="settingsPage" class="page" style="display:none; text-align:center;">
        <div class="card">
            <p id="username2" style="font-weight:bold;"></p>
            <p id="useremail" style="color:#00d4ff;"></p>
            <p id="usernumber"></p>
            <p id="userid"></p>
        </div>
        <div class="card">
            <h4>Change Password</h4>
            <input id="oldPass" type="password" placeholder="Old Password">
            <input id="newPass" type="password" placeholder="New Password">
            <button onclick="changePassword()" style="background:#6a11cb; color:white; width:90%;">Update Password</button>
        </div>
        <button onclick="logout()" style="background:red; color:white; width:90%; margin-top:20px; padding:12px; border-radius:10px;">Logout</button>
    </div>

    <div class="bottomNav">
        <div onclick="showPage('homePage')">🏠<br>Home</div>
        <div onclick="showPage('earningPage')">💰<br>Earning</div>
        <div onclick="showPage('settingsPage')">⚙️<br>Settings</div>
    </div>
</div>

<div id="depositBox" class="popup">
    <div class="popup-box" style="text-align:center; padding:20px; border-radius:15px;">
        <h2 id="amountText">₹0</h2>
        <img id="qrImage" src="" style="width: 200px; display: none; margin: 10px auto;">
        <button id="downloadQrBtn" onclick="downloadQR()" style="background:#555; color:white; padding:8px; border-radius:5px; display:none; margin-bottom:10px;">⬇️ Download QR</button>
        <p id="upiText"></p>
        <input id="utr" placeholder="Enter UTR Number">
        <button onclick="submitDeposit()" style="background:green; color:white; width:100%; padding:10px; border-radius:5px;">Submit</button>
        <button onclick="closeDeposit()" style="width:100%; margin-top:5px; padding:10px;">Close</button>
    </div>
</div>

<div id="forgotBox" class="popup">
    <div class="popup-box" style="border-radius:15px; padding:20px;">
        <h3>Reset Password</h3>
        <input id="forgotEmail" placeholder="Email Address">
        <button onclick="forgotPassword()" style="background:#6a11cb; color:white; width:100%; padding:10px; border-radius:5px;">Send Link</button>
        <button onclick="closeForgot()" style="width:100%; margin-top:5px; padding:10px;">Cancel</button>
    </div>
</div>

<div id="msgBox" class="popup">
    <div class="popup-box" style="border-radius:15px; padding:20px;"><p id="msgText" style="text-align:center;"></p><button onclick="closeMsg()" style="width:100%; background:#6a11cb; color:white; padding:10px; border-radius:5px;">OK</button></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
