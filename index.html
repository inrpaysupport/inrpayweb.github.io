<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INRPAY</title>
    <script src="https://alwingulla.com/88/prm/tagma.js?tag=YOUR_TAG_ID" async></script>
    <link rel="stylesheet" href="style.css">
    <style>
        input, .passwordBox { width: 85% !important; margin: 10px auto !important; display: block !important; }
        .popup { z-index: 9999 !important; }
        .bottomNav { z-index: 1000 !important; position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; background: #111; padding: 12px 0; text-align: center; }
        .bottomNav div { cursor: pointer; color: white; font-size: 12px; }
        .no-data-box { text-align: center; padding: 20px; color: #ccc; font-style: italic; font-size: 12px; }
        .status-active { color: #4caf50 !important; }
        .status-deactive { color: #ff4d4d !important; }
        .history-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin: 15px; }
        #liveTransactions, #referralList { max-height: 180px; overflow-y: auto; font-size: 12px; }
    </style>
</head>
<body>
<div id="splash">
    <div class="splash-bg-blobs"><div class="blob"></div><div class="blob"></div></div>
    <div class="splash-content">
        <div class="splash-logo">INRPAY</div>
        <div class="splash-loader"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="splash-text"><p class="fade-in-text">Fast & Secure</p></div>
    </div>
</div>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Sign In</h2>
    <input id="number" placeholder="Mobile Number" maxlength="10">
    <div class="passwordBox"><input id="password" type="password" placeholder="Password"><span onclick="togglePass()" class="eyeIcon">👁</span></div>
    <button id="loginBtn" onclick="login()">Sign In</button>
    <p id="toggleText">Don't have an account? <button class="linkBtn" onclick="showRegister()">Sign Up</button></p>
</div>

<div id="app" style="display:none;">
    <div class="notice"><span id="scrollingNotice">Welcome to INRPAY</span></div>
    <div id="homePage" class="page">
        <h2 id="usernameHome" style="padding-left:15px;"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>
        <div class="card" onclick="triggerAd('Security')" style="background: rgba(255,255,255,0.1); cursor:pointer;">
            <h3 style="margin:0; text-align:center;">🛡️ Security Deposit</h3>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span>Account Bind Status</span>
                <span id="accStatusWrap" class="status-deactive" style="font-weight:bold;">● <span id="accStatusText" style="color:white; font-weight:normal;">Deactivate</span></span>
            </div>
        </div>
        <div class="card">
            <h4 style="margin:0 0 10px 0;">Recent Transactions</h4>
            <div id="liveTransactions"><div class="no-data-box">No data available</div></div>
        </div>
    </div>

    <div id="earningPage" class="page" style="display:none;">
        <div class="history-card">
            <h3 style="margin-top:0;">Referral History</h3>
            <div id="referralList"><div class="no-data-box">No referrals yet</div></div>
        </div>
    </div>

    <div class="bottomNav">
        <div onclick="showPage('homePage')">🏠<br>Home</div>
        <div onclick="showPage('earningPage')">💰<br>Earning</div>
    </div>
</div>

<div id="msgBox" class="popup"><div class="popup-box"><p id="msgText"></p><button onclick="closeMsg()">OK</button></div></div>
<script type="module" src="script.js"></script>
</body>
</html>
