<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INRPAY</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h1 class="appLogo">INRPAY</h1>
<h2 id="authTitle">Create Account</h2>

<input id="name" placeholder="Name">
<input id="number" placeholder="Mobile Number">

<div class="passwordBox">
<input id="password" type="password" placeholder="Password">
<span onclick="togglePass()" class="eyeIcon">👁</span>
</div>

<button id="registerBtn" onclick="register()">Sign Up</button>
<button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

<p>
Already have account?
<button id="switchAuth" class="linkBtn">Sign In</button>
</p>

<p id="forgotText" style="display:none;">Forgot Password?</p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
<h2 id="usernameHome"></h2>
<h1>₹<span id="earnBalance">0</span></h1>
</div>

<!-- Account Bind -->
<div class="card">
<div class="txRow">
<div>Account Bind</div>
<div class="txRight">
<div class="dot"></div>
<div>Deactivate</div>
</div>
</div>
</div>

<div class="account-bind-box">
<div onclick="deposit()">Security Deposit</div>
<div onclick="openBank()">Add Bank Account</div>
</div>

</div>

<!-- Deposit -->
<div id="depositBox" class="popup">
<div class="popup-box">
<h2 id="amountText">₹1000</h2>
<img id="qrImage">
<p id="upiText"></p>
<input id="utr" placeholder="Enter UTR">
<button onclick="submitDeposit()">Submit</button>
<button onclick="closeDeposit()">Close</button>
</div>
</div>

<!-- Message -->
<div id="msgBox" class="popup">
<div class="popup-box">
<p id="msgText"></p>
<button onclick="closeMsg()">OK</button>
</div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
