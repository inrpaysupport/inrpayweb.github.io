<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INRPAY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Create Account</h2>
    <input id="name" placeholder="Name">
    <input id="number" placeholder="Mobile Number" maxlength="10">
    <input id="email" placeholder="Email Address">
    <div class="passwordBox">
        <input id="password" type="password" placeholder="Password">
        <span onclick="togglePass()" class="eyeIcon">👁</span>
    </div>
    <button id="registerBtn" onclick="register()">Sign Up</button>
    <button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>
    <p id="toggleText">Already have account? <button class="linkBtn" onclick="showLogin()">Sign In</button></p>
</div>

<div id="app" style="display:none;">
    <div id="homePage" class="page">
        <h2 id="usernameHome"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>
    </div>

    <div id="earningPage" class="page" style="display:none;">
        <div class="card">
            <h3>Withdrawal</h3>
            <input id="withdrawAmount" type="number" placeholder="Earning (Min ₹100)">
            <button onclick="submitWithdraw()">Request Withdraw</button>
        </div>
    </div>

    <div id="settingsPage" class="page" style="display:none; text-align:center;">
        <div class="card">
            <p id="username2" style="font-weight:bold;"></p>
            <p id="useremail" style="color:#00d4ff;"></p> <p id="usernumber"></p>
        </div>
        <div class="card">
            <h4>Change Password</h4>
            <input id="oldPass" type="password" placeholder="Old Password">
            <input id="newPass" type="password" placeholder="New Password">
            <button onclick="changePassword()" style="background:#6a11cb; color:white;">Update Password</button>
        </div>
        <button onclick="logout()" style="background:red; color:white;">Logout</button>
    </div>

    <div class="bottomNav">
        <div onclick="showPage('homePage')">🏠<br>Home</div>
        <div onclick="showPage('earningPage')">💰<br>Earn</div> <div onclick="showPage('settingsPage')">⚙️<br>Settings</div>
    </div>
</div>

<div id="msgBox" class="popup">
    <div class="popup-box">
        <p id="msgText"></p>
        <button onclick="closeMsg()">OK</button>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
