<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INRPAY</title>
<link rel="stylesheet" href="style.css">
<style>
    /* Sabhi inputs aur password box ko center karne ke liye */
    #auth {
        text-align: center;
    }
    
    input, .passwordBox {
        width: 85% !important;
        margin: 10px auto !important;
        display: block !important;
        text-align: left; /* Text andar se left rahega par box center rahega */
    }

    .passwordBox { 
        position: relative; 
        padding: 0;
    }
    
    .passwordBox input { 
        width: 100% !important; 
        margin: 0 !important; 
    }
    
    .forgot-link {
        color: white;
        font-size: 13px;
        text-decoration: underline;
        margin: 5px auto 15px auto;
        display: block;
        cursor: pointer;
    }
</style>
</head>

<body>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Create Account</h2>

    <div id="authFields" style="width: 100%;">
        <input id="name" placeholder="Name">
        
        <input id="number" placeholder="Mobile Number" maxlength="10">

        <div class="passwordBox">
            <input id="password" type="password" placeholder="Password">
            <span onclick="togglePass()" class="eyeIcon">👁</span>
        </div>

        <p id="forgotText" class="forgot-link" style="display:none;" onclick="showMsg('Contact admin to reset password')">Forgot Password?</p>
    </div>

    <button id="registerBtn" onclick="register()">Sign Up</button>
    <button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

    <p id="toggleText">
        Already have account? 
        <button class="linkBtn" onclick="showLogin()">Sign In</button>
    </p>
</div>

<div id="app" style="display:none;">
    <div class="notice"><span id="scrollingNotice">Loading notice...</span></div>
    <div id="homePage" class="page">
        <h2 id="usernameHome" style="padding-left:15px;"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>
        <div class="account-bind-box">
            <div onclick="deposit()">Security Deposit</div>
            <div onclick="openBank()">Add Bank Account</div>
        </div>
    </div>
</div>

<div id="msgBox" class="popup">
    <div class="popup-box"><p id="msgText"></p><button onclick="closeMsg()">OK</button></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
