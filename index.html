<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INRPAY</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="auth">
    <h1 class="appLogo">INRPAY</h1>
    <h2 id="authTitle">Create Account</h2>

    <input id="name" placeholder="Name">
    
    <input id="number" placeholder="Mobile Number" maxlength="10">

    <div class="passwordBox">
        <input id="password" type="password" placeholder="Password">
        <span onclick="togglePass()" class="eyeIcon">👁</span>
    </div>

    <button id="registerBtn" onclick="register()">Sign Up</button>
    <button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

    <p id="toggleText">
        Already have account? 
        <button class="linkBtn" onclick="showLogin()">Sign In</button>
    </p>

    <p id="forgotText" style="display:none; text-align:center; cursor:pointer;">Forgot Password?</p>
</div>

<div id="app" style="display:none;">
    <div class="notice">
        <span id="scrollingNotice">Security deposit amount will be refunded to your bank account within 24–48 hours.</span>
    </div>

    <div style="text-align: center; margin: 10px 0;">
        <button onclick="openSupport()" class="support-btn" style="background:#ff9800; color:white; width:90%; font-weight:bold; padding:10px; border-radius:8px; border:none;">🎧 Customer Support</button>
    </div>

    <div id="homePage" class="page">
        <h2 id="usernameHome" style="padding-left:15px;"></h2>
        <div class="card"><h1 id="balance">₹0</h1></div>
        <div class="account-bind-box">
            <div onclick="deposit()">Security Deposit</div>
            <div onclick="openBank()">Add Bank Account</div>
        </div>
        <div class="card">
            <div class="txRow" style="display:flex; justify-content:space-between; align-items:center;">
                <div>Account Bind</div>
                <div class="txRight" style="display:flex; align-items:center; gap:8px;">
                    <div class="dot red" style="height:10px; width:10px; background:red; border-radius:50%;"></div>
                    <div style="color:#ff4d4d; font-weight:bold;">Deactivate</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="msgBox" class="popup">
    <div class="popup-box">
        <p id="msgText"></p>
        <button onclick="closeMsg()">OK</button>
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
