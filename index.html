<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INRPAY</title>
    <link rel="stylesheet" href="style.css">
    <style>
        input, .passwordBox {
            width: 85% !important;
            margin: 10px auto !important;
            display: block !important;
        }
        .passwordBox { position: relative; }
        .passwordBox input { width: 100% !important; margin: 0 !important; }
        .popup { z-index: 9999 !important; }
        .bottomNav { 
            z-index: 1000 !important; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            background: #111; 
            padding: 12px 0; 
            text-align: center;
        }
        .bottomNav div { cursor: pointer; color: white; font-size: 12px; }
        
        /* QR Code Styling for Amount ke niche */
        #qrImage {
            width: 220px;
            height: 220px;
            margin: 15px auto;
            display: none; /* Initially hidden */
            border: 2px solid #6a11cb;
            border-radius: 10px;
            padding: 5px;
            background: white;
        }
    </style>
</head>
<body>

<div id="app" style="display:none;">
    <div class="notice"><span id="scrollingNotice">Loading notice...</span></div>
    
    <div class="bottomNav">
        <div onclick="showPage('homePage')">🏠<br>Home</div>
        <div onclick="showPage('earningPage')">💰<br>Earning</div>
        <div onclick="showPage('settingsPage')">⚙️<br>Settings</div>
    </div>
</div>

<div id="depositBox" class="popup">
    <div class="popup-box" style="text-align:center;">
        <h3 style="margin-bottom:5px;">Security Deposit</h3>
        <h2 id="amountText" style="color: #6a11cb; margin-top:0;">₹0</h2>
        
        <img id="qrImage" src="" alt="Payment QR">
        
        <p id="upiText" style="font-weight:bold; font-size:14px; margin: 10px 0;"></p>
        <input id="utr" placeholder="Enter 12 Digit UTR Number" maxlength="12">
        <button onclick="submitDeposit()" style="background:green; color:white; width:100%; font-weight:bold;">Submit UTR</button>
        <button onclick="closeDeposit()" style="width:100%; margin-top:5px; background:#ccc; color:black;">Close</button>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
