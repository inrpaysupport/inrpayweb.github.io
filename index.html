<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INRPAY</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="auth">
<h1>INRPAY</h1>
<input id="name" placeholder="Name">
<input id="number" placeholder="Mobile Number">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<div id="homePage" class="page">

<h2 id="usernameHome"></h2>

<div class="card">
₹<span id="balance">0</span>
</div>

<!-- SERVICES -->
<div class="services">

<div class="card" onclick="deposit()">
<div class="txRow">
<div>Security Deposit</div>
<div class="txRight">
<div class="dot"></div>
<div>Pending</div>
</div>
</div>
</div>

<div class="card" onclick="openBank()">
<div class="txRow">
<div>Add Bank Account</div>
<div class="txRight">
<div class="dot"></div>
<div>Bind</div>
</div>
</div>
</div>

</div>

<!-- ACCOUNT BIND -->
<div class="card">
<div class="txRow">
<div>Account Bind</div>
<div class="txRight">
<div id="bindDot" class="dot"></div>
<div id="bindStatus">Deactivate</div>
</div>
</div>
</div>

</div>

<!-- EARN -->
<div id="earnPage" class="page" style="display:none;">
<h3>Earnings</h3>
₹<span id="earnBalance">0</span>
</div>

<!-- SETTINGS -->
<div id="settingsPage" class="page" style="display:none;">
<input id="oldPass" placeholder="Old Password">
<input id="newPass" placeholder="New Password">
<input id="confirmPass" placeholder="Confirm Password">
<button onclick="changePassword()">Change Password</button>
</div>

<!-- NAV -->
<div class="bottomNav">
<div onclick="showPage('homePage')">🏠</div>
<div onclick="showPage('earnPage')">💰</div>
<div onclick="showPage('settingsPage')">⚙️</div>
</div>

</div>

<!-- DEPOSIT POPUP -->
<div id="depositBox" class="popup">
<div class="popup-box">

<h3>Security Deposit</h3>

<h2 id="depositAmountText">₹0</h2>

<img id="qrImage" style="width:200px">

<p id="upiText"></p>

<input id="utr" placeholder="Enter UTR">

<button onclick="submitDeposit()">Submit</button>
<button onclick="closeDeposit()">Close</button>

</div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
