<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>INRPay</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div id="auth">

<h2 id="authTitle">Create Account</h2>

<input id="name" placeholder="Name">
<input id="number" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">

<button id="registerBtn" onclick="register()">Sign Up</button>
<button id="loginBtn" onclick="login()" style="display:none;">Sign In</button>

<p id="toggleText">
Already have an account? 
<span onclick="showLogin()" style="color:yellow;">Sign In</span>
</p>

</div>

<!-- ================= MAIN APP ================= -->
<div id="app" style="display:none;">

<!-- ===== HOME ===== -->
<div id="homePage" class="page">

<h2 id="usernameHome"></h2>

<div class="card">
<p>Wallet Balance</p>
<h1 id="balance">₹0</h1>

<div class="row">
<div>Deposit<br><span id="depositTotal">0</span></div>
<div>Earnings<br><span id="earnings">0</span></div>
</div>

<p style="color:lightgreen;">Cashed Out: ₹0</p>
</div>

<button onclick="deposit()">Deposit</button>
<button onclick="openBank()">Bank</button>

</div>

<!-- ===== EARNINGS ===== -->
<div id="earnPage" class="page" style="display:none;">

<h2>Earnings</h2>

<div class="card">
<h1 id="earnings2">₹0</h1>
<button>Withdraw</button>
</div>

</div>

<!-- ===== SETTINGS ===== -->
<div id="settingsPage" class="page" style="display:none;">

<h2>Settings</h2>

<div class="card">
<p id="username2"></p>
<p id="usernumber"></p>
</div>

<div class="card">
<h3>Change Password</h3>

<input id="oldPass" placeholder="Current Password">
<input id="newPass" placeholder="New Password">
<input id="confirmPass" placeholder="Confirm Password">

<button onclick="changePassword()">Change Password</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottomNav">
<button onclick="showPage('homePage')">Home</button>
<button onclick="showPage('earnPage')">Earnings</button>
<button onclick="showPage('settingsPage')">Settings</button>
</div>

</div>

<!-- ================= POPUPS ================= -->

<div id="depositBox" class="popup">
<div class="popup-box">

<h3>Deposit ₹1000</h3>

<img id="qrImg" width="150">
<p id="upiText"></p>

<input id="utr" placeholder="Enter UTR">
<button onclick="submitDeposit()">Submit</button>

<div id="depositList"></div>

<button onclick="closeDeposit()">Close</button>

</div>
</div>

<div id="bankBox" class="popup">
<div class="popup-box">

<h3>Bank Accounts</h3>

<div id="bankList"></div>

<input id="accNumber" placeholder="Account">
<input id="bankName" placeholder="Bank">

<button onclick="saveBank()">Add</button>

<button onclick="closeBank()">Close</button>

</div>
</div>

<!-- MESSAGE -->
<div id="msgBox" class="popup">
<div class="popup-box">
<p id="msgText"></p>
<button onclick="closeMsg()">OK</button>
</div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
