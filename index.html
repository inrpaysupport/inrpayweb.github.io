<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>INRPay</title>
<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#2b0a4a,#6a11cb);
color:white;
text-align:center;
}
input,button{
padding:10px;
margin:5px;
width:80%;
}
.card{
background:#7b2ff7;
padding:20px;
margin:20px;
border-radius:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
<h2>INRPay</h2>
<input id="name" placeholder="Name (register)">
<input id="number" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Create Account</button>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dash" style="display:none;">
<h2 id="username"></h2>

<div class="card">
<p>Wallet Balance</p>
<h1 id="balance">₹0</h1>
<button onclick="deposit()">Deposit ₹1000</button>
</div>

<button onclick="logout()">Logout</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 REGISTER
window.register = async function(){
let name=document.getElementById("name").value;
let number=document.getElementById("number").value;
let password=document.getElementById("password").value;

let ref = doc(db,"users",number);
let snap = await getDoc(ref);

if(snap.exists()){
alert("User exists");
return;
}

await setDoc(ref,{
name,
number,
password,
balance:0
});

alert("Account created");
}

// 🔐 LOGIN
window.login = async function(){
let number=document.getElementById("number").value;
let password=document.getElementById("password").value;

let ref = doc(db,"users",number);
let snap = await getDoc(ref);

if(!snap.exists()){
alert("User not found");
return;
}

let user = snap.data();

if(user.password !== password){
alert("Wrong password");
return;
}

document.getElementById("auth").style.display="none";
document.getElementById("dash").style.display="block";

document.getElementById("username").innerText=user.name;
document.getElementById("balance").innerText="₹"+user.balance;

localStorage.setItem("user", number);
}

// 💳 DEPOSIT
window.deposit = async function(){
let number = localStorage.getItem("user");

let ref = doc(db,"users",number);
let snap = await getDoc(ref);

let user = snap.data();
let newBalance = user.balance + 1000;

await updateDoc(ref,{balance:newBalance});

document.getElementById("balance").innerText="₹"+newBalance;
}

// 🚪 LOGOUT
window.logout = function(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
