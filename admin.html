<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - INRPAY</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; color: #333; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #2b0a4a; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #6a11cb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:hover { background: #2b0a4a; }
        #adminApp { display: none; }
        .list-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .approve-btn { width: auto; background: #28a745; padding: 5px 15px; }
    </style>
</head>
<body>

<div id="adminAuth" class="container">
    <h2>Admin Login</h2>
    <input id="adminUser" type="text" placeholder="Admin Username">
    <input id="adminPass" type="password" placeholder="Admin Password">
    <button onclick="adminLogin()">Login</button>
</div>

<div id="adminApp" class="container">
    <h2>Settings Control</h2>
    
    <label>Scrolling Notice Text:</label>
    <textarea id="noticeInput" rows="2" placeholder="Enter notice text..."></textarea>
    
    <button id="upload_widget" style="background: #007bff;">Upload QR (Cloudinary)</button>
    <input id="qr" placeholder="QR Image URL" readonly>
    
    <input id="upi" placeholder="UPI ID">
    <input id="amount" placeholder="Deposit Amount">
    
    <button onclick="save()" style="background: #2b0a4a; margin-top: 15px;">Update All Settings</button>

    <hr style="margin: 25px 0;">
    <h3>Pending Withdrawals</h3>
    <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, getDocs, collection, updateDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
    apiKey:"AIzaSyBh-J9LAYeCfxNoKw9C94gbCqVhELofuoo",
    authDomain:"inrpay-44413.firebaseapp.com",
    projectId:"inrpay-44413"
});
const db = getFirestore(app);

// ✅ Firebase Admin Login Check
window.adminLogin = async () => {
    const userInp = document.getElementById("adminUser").value;
    const passInp = document.getElementById("adminPass").value;
    
    try {
        const adminRef = doc(db, "admin", userInp);
        const snap = await getDoc(adminRef);

        if (snap.exists() && snap.data().password === passInp) {
            document.getElementById("adminAuth").style.display = "none";
            document.getElementById("adminApp").style.display = "block";
            loadCurrentSettings();
            loadWithdrawals();
        } else {
            alert("Invalid Username or Password!");
        }
    } catch (e) {
        alert("Login Error: Make sure document ID is your username.");
    }
};

// Cloudinary Widget
var myWidget = cloudinary.createUploadWidget({
    cloudName: 'demo', 
    uploadPreset: 'unsigned_preset'
}, (error, result) => { 
    if (!error && result && result.event === "success") { 
        document.getElementById("qr").value = result.info.secure_url;
    }
});
document.getElementById("upload_widget").onclick = () => myWidget.open();

async function loadCurrentSettings() {
    let snap = await getDoc(doc(db,"settings","main"));
    if(snap.exists()) {
        let d = snap.data();
        document.getElementById("noticeInput").value = d.notice || "";
        document.getElementById("qr").value = d.qr || "";
        document.getElementById("upi").value = d.upi || "";
        document.getElementById("amount").value = d.amount || "";
    }
}

window.save = async () => {
    await setDoc(doc(db,"settings","main"), {
        notice: document.getElementById("noticeInput").value,
        qr: document.getElementById("qr").value,
        upi: document.getElementById("upi").value,
        amount: document.getElementById("amount").value
    });
    alert("System Updated!");
};

async function loadWithdrawals(){
    let snap = await getDocs(collection(db,"withdraw"));
    const list = document.getElementById("list");
    list.innerHTML = "";
    snap.forEach(d => {
        let data = d.data();
        if(data.status === "Pending") {
            list.innerHTML += `<div class="list-item">
                <span>User: ${data.user} | <b>₹${data.amount}</b></span>
                <button class="approve-btn" onclick="approve('${d.id}')">Approve</button>
            </div>`;
        }
    });
}

window.approve = async(id) => {
    await updateDoc(doc(db,"withdraw",id), {status:"Done"});
    loadWithdrawals();
};
</script>
</body>
</html>
