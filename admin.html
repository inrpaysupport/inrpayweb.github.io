<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - INRPAY</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #6a11cb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #adminApp { display: none; }
        .list-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="adminAuth" class="container">
    <h2>Admin Login</h2>
    <input id="adminUser" type="text" placeholder="Username">
    <input id="adminPass" type="password" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
</div>

<div id="adminApp" class="container">
    <h2>Admin Settings</h2>
    <label>Scrolling Notice:</label>
    <textarea id="noticeInput" rows="2"></textarea>
    <button id="upload_widget" style="background: #007bff; margin-bottom: 10px;">Upload QR (Cloudinary)</button>
    <input id="qr" placeholder="QR URL" readonly>
    <input id="upi" placeholder="UPI ID">
    <input id="amount" placeholder="Deposit Amount">
    <button onclick="save()" style="background: #2b0a4a;">Save All Settings</button>
    <hr>
    <h3>Withdrawal Requests</h3>
    <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, getDocs, collection, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyBh-J9LAYeCfxNoKw9C94gbCqVhELofuoo",
    authDomain: "inrpay-44413.firebaseapp.com",
    projectId: "inrpay-44413"
});
const db = getFirestore(app);

window.adminLogin = async () => {
    const u = document.getElementById("adminUser").value;
    const p = document.getElementById("adminPass").value;

    const snap = await getDoc(doc(db, "admins", "admin1"));

    if (snap.exists() && snap.data().username === u && snap.data().password === p) {
        document.getElementById("adminAuth").style.display = "none";
        document.getElementById("adminApp").style.display = "block";
        loadData();
    } else { alert("Wrong Username or Password!"); }
};

window.save = async () => {
    await setDoc(doc(db, "settings", "main"), {
        notice: document.getElementById("noticeInput").value,
        qr: document.getElementById("qr").value,
        upi: document.getElementById("upi").value,
        amount: document.getElementById("amount").value
    });
    alert("Updated!");
};

async function loadData() {
    let s = await getDoc(doc(db, "settings", "main"));
    if(s.exists()){
        document.getElementById("noticeInput").value = s.data().notice || "";
        document.getElementById("qr").value = s.data().qr || "";
        document.getElementById("upi").value = s.data().upi || "";
        document.getElementById("amount").value = s.data().amount || "";
    }
    const snap = await getDocs(collection(db, "withdraw"));
    const list = document.getElementById("list");
    list.innerHTML = "";
    snap.forEach(d => {
        if(d.data().status === "Pending") {
            list.innerHTML += `<div class="list-item"><span>${d.data().user} | ₹${d.data().amount}</span><button onclick="approve('${d.id}')" style="width:auto; padding:5px 10px; background:green;">Approve</button></div>`;
        }
    });
}

window.approve = async (id) => {
    await updateDoc(doc(db, "withdraw", id), { status: "Done" });
    alert("Approved!");
    loadData();
};
</script>
</body>
</html>
