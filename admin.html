<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>

<input id="notice" placeholder="Top Notice Text">
<input id="qr" placeholder="Cloudinary QR URL">
<input id="upi" placeholder="UPI ID">
<input id="amount" placeholder="Deposit Amount">

<button onclick="save()">Save</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBh-J9LAYeCfxNoKw9C94gbCqVhELofuoo",
authDomain:"inrpay-44413.firebaseapp.com",
projectId:"inrpay-44413"
});

const db=getFirestore(app);

window.save=async()=>{
await setDoc(doc(db,"settings","main"),{
notice:document.getElementById("notice").value,
qr:document.getElementById("qr").value,
upi:document.getElementById("upi").value,
amount:document.getElementById("amount").value
});
alert("Updated");
};

</script>

</body>
</html>
