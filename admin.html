<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Admin Panel</title>
</head>

<body>

<h2>Admin Panel</h2>

<input id="upi" placeholder="Enter UPI ID">
<input id="qr" placeholder="QR Image URL">

<button onclick="save()">Save</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBh-J9LAYeCfxNoKw9C94gbCqVhELofuoo",
  authDomain: "inrpay-44413.firebaseapp.com",
  projectId: "inrpay-44413"
});

const db = getFirestore(app);

window.save = async function(){

let upi = document.getElementById("upi").value;
let qr = document.getElementById("qr").value;

await setDoc(doc(db,"settings","payment"),{
upi,
qr
});

alert("Saved successfully");
}

</script>

</body>
</html>
