<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>

<input type="file" id="file">
<input id="upi" placeholder="UPI ID">
<input id="amount" placeholder="Deposit Amount">

<button onclick="upload()">Upload QR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBh-J9LAYeCfxNoKw9C94gbCqVhELofuoo",
authDomain:"inrpay-44413.firebaseapp.com",
projectId:"inrpay-44413"
});

const db=getFirestore(app);

/* 🔥 Hidden Cloudinary config */
const CLOUD_NAME="demo";   // <-- change once
const PRESET="unsigned";  // <-- change once

window.upload=async()=>{
let file=document.getElementById("file").files[0];
if(!file) return alert("Select file");

let fd=new FormData();
fd.append("file",file);
fd.append("upload_preset",PRESET);

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:fd
});

let data=await res.json();

await setDoc(doc(db,"settings","main"),{
qr:data.secure_url,
upi:document.getElementById("upi").value,
amount:document.getElementById("amount").value
});

alert("Uploaded");
};

</script>

</body>
</html>
