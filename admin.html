<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, getDocs, collection, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBh...",
authDomain:"inrpay-44413.firebaseapp.com",
projectId:"inrpay-44413"
});

const db=getFirestore(app);

async function load(){
let snap=await getDocs(collection(db,"withdraw"));

list.innerHTML="";

snap.forEach(d=>{
let data=d.data();

list.innerHTML+=`
<div>
${data.name} | ₹${data.amount} | ${data.status}
<button onclick="approve('${d.id}')">Approve</button>
</div>`;
});
}

window.approve=async(id)=>{
await updateDoc(doc(db,"withdraw",id),{
status:"Done"
});
load();
}

load();

</script>

</body>
</html>
