<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>

<!-- ✅ FIX 5 -->
<input id="qr" placeholder="Cloudinary QR URL">
<input id="upi" placeholder="UPI ID">
<input id="amount" placeholder="Deposit Amount">

<button onclick="save()">Save</button>

<hr>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, getDocs, collection, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBh-J9LAYeCfxNoKw9C94gbCqVhELofuoo",
authDomain:"inrpay-44413.firebaseapp.com",
projectId:"inrpay-44413"
});

const db=getFirestore(app);

// ✅ SAVE SETTINGS
window.save=async()=>{
await setDoc(doc(db,"settings","main"),{
qr:document.getElementById("qr").value,
upi:document.getElementById("upi").value,
amount:document.getElementById("amount").value
});
alert("Updated");
};

async function load(){
let snap=await getDocs(collection(db,"withdraw"));
list.innerHTML="";
snap.forEach(d=>{
let data=d.data();
list.innerHTML+=`
<div>
${data.user} | ₹${data.amount}
<button onclick="approve('${d.id}')">Approve</button>
</div>`;
});
}

window.approve=async(id)=>{
await updateDoc(doc(db,"withdraw",id),{status:"Done"});
load();
};

load();

</script>

</body>
</html>
