<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - INRPAY</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; max-width: 600px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2, h3 { color: #2b0a4a; text-align: center; border-bottom: 2px solid #6a11cb; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #6a11cb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 5px; }
        button:hover { background: #2b0a4a; }
        #adminApp { display: none; }
        .list-item { border-left: 5px solid #6a11cb; background: #f9f9f9; margin-bottom: 15px; padding: 15px; border-radius: 5px; display: flex; flex-direction: column; gap: 5px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .status-badge { font-weight: bold; padding: 2px 8px; border-radius: 4px; font-size: 12px; display: inline-block; width: fit-content; }
        .pending { background: #fff3cd; color: #856404; }
        .approved { background: #d4edda; color: #155724; }
        .action-btn { background: #28a745; width: auto; align-self: flex-end; padding: 8px 15px; font-size: 12px; margin-top: 5px; }
        .section-title { margin-top: 30px; text-align: left; font-size: 18px; color: #444; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="adminAuth" class="container">
    <h2>Admin Login</h2>
    <input id="adminUser" type="text" placeholder="Username">
    <input id="adminPass" type="password" placeholder="Password">
    <button onclick="adminLogin()">Access Panel</button>
</div>

<div id="adminApp">
    <div class="container">
        <h2>Admin Panel</h2>
        <textarea id="noticeInput" rows="2" placeholder="Scrolling Notice"></textarea>
        <button id="upload_widget_btn" style="background: #007bff;">Upload QR</button>
        <input id="qr" placeholder="QR URL" readonly>
        <input id="upi" placeholder="UPI ID">
        <input id="amount" placeholder="Security Deposit Amount">
        <button onclick="save()" style="background: #2b0a4a;">Save Settings</button>
    </div>

    <div class="container">
        <h3 class="section-title">👥 Referral Reports</h3>
        <div id="referralReportList">Loading...</div>
    </div>

    <div class="container">
        <h3 class="section-title">🛡️ Deposit History</h3>
        <div id="depositList"></div>
    </div>

    <div class="container">
        <h3 class="section-title">💰 Withdrawals</h3>
        <div id="withdrawalList"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, getDocs, collection, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyBh-J9LAYeCfxNoKw9C94gbCqVhELofuoo", authDomain: "inrpay-44413.firebaseapp.com", projectId: "inrpay-44413" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const myWidget = cloudinary.createUploadWidget({ cloudName: "dxxwlovdf", uploadPreset: "inrpay_upload" }, (error, result) => { 
    if (!error && result && result.event === "success") { document.getElementById("qr").value = result.info.secure_url; }
});
document.getElementById("upload_widget_btn").addEventListener("click", () => myWidget.open());

window.adminLogin = async () => {
    const u = document.getElementById("adminUser").value;
    const p = document.getElementById("adminPass").value;
    const snap = await getDoc(doc(db, "admins", "admin1"));
    if (snap.exists() && snap.data().username === u && snap.data().password === p) {
        document.getElementById("adminAuth").style.display = "none";
        document.getElementById("adminApp").style.display = "block";
        loadPanelData();
    } else { alert("Invalid Credentials!"); }
};

window.save = async () => {
    await setDoc(doc(db, "settings", "main"), {
        notice: document.getElementById("noticeInput").value,
        qr: document.getElementById("qr").value,
        upi: document.getElementById("upi").value,
        amount: document.getElementById("amount").value
    });
    alert("Updated!");
};

async function loadPanelData() {
    // Settings
    let s = await getDoc(doc(db, "settings", "main"));
    if(s.exists()){
        document.getElementById("noticeInput").value = s.data().notice;
        document.getElementById("qr").value = s.data().qr;
        document.getElementById("upi").value = s.data().upi;
        document.getElementById("amount").value = s.data().amount;
    }

    // Referral Reports
    const users = await getDocs(collection(db, "users"));
    const reportList = document.getElementById("referralReportList");
    reportList.innerHTML = "";
    
    users.forEach(async (uDoc) => {
        const u = uDoc.data();
        const q = query(collection(db, "users"), where("referredBy", "==", u.uid.toString()));
        const refSnap = await getDocs(q);
        if(refSnap.size > 0) {
            reportList.innerHTML += `<div class="list-item"><span><b>${u.name}</b> (UID: ${u.uid})</span><span>Total Referrals: <b>${refSnap.size}</b></span></div>`;
        }
    });

    // Deposits
    const depSnap = await getDocs(collection(db, "deposits"));
    document.getElementById("depositList").innerHTML = "";
    depSnap.forEach(d => {
        const item = d.data();
        document.getElementById("depositList").innerHTML += `<div class="list-item"><span>User: ${item.user}</span><span>UTR: ${item.utr}</span><span>Status: ${item.status}</span>${item.status=="Pending" ? `<button onclick="approveDeposit('${d.id}')">Approve</button>` : ""}</div>`;
    });

    // Withdrawals
    const withSnap = await getDocs(collection(db, "withdrawals"));
    document.getElementById("withdrawalList").innerHTML = "";
    withSnap.forEach(d => {
        if(d.data().status=="Pending") {
            document.getElementById("withdrawalList").innerHTML += `<div class="list-item"><span>User: ${d.data().user}</span><span>Amount: ₹${d.data().amount}</span><button onclick="approveWithdrawal('${d.id}')">Paid</button></div>`;
        }
    });
}

window.approveDeposit = async (id) => { await updateDoc(doc(db, "deposits", id), { status: "Approved" }); loadPanelData(); };
window.approveWithdrawal = async (id) => { await updateDoc(doc(db, "withdrawals", id), { status: "Done" }); loadPanelData(); };
</script>
</body>
</html>
