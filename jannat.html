<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - INRPAY</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; max-width: 600px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2, h3 { color: #2b0a4a; text-align: center; border-bottom: 2px solid #6a11cb; padding-bottom: 10px; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #6a11cb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #2b0a4a; }
        
        .list-item { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #6a11cb; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .list-item span { font-size: 13px; }
        .action-btn { background: #4caf50; padding: 8px; font-size: 12px; width: auto; margin-top: 5px; align-self: flex-start; }

        #upload-btn { background: #0088cc; }
        .preview-qr { width: 100px; height: 100px; margin-top: 10px; border-radius: 8px; display: block; border: 1px solid #ddd; }
        
        /* New Referral Styles */
        .ref-count { font-weight: bold; color: #6a11cb; }
        .ref-details { font-size: 11px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>INRPAY Admin</h2>
    
    <h3>Update Settings</h3>
    <input id="upi" placeholder="New UPI ID">
    <input id="notice" placeholder="Scrolling Notice Text">
    <input id="amount" type="number" placeholder="Security Amount (₹)">
    
    <button id="upload-btn">Upload QR Code (Cloudinary)</button>
    <input type="hidden" id="qrUrl">
    <img id="qrPreview" class="preview-qr" src="" style="display:none;">
    
    <button onclick="updateSettings()">Save All Settings</button>
</div>

<div class="container">
    <h3>User Referral Tracking</h3>
    <div id="referralStatsList">
        <p style="text-align:center;">Loading user data...</p>
    </div>
</div>

<div class="container">
    <h3>Pending Deposits</h3>
    <div id="depositList"></div>
</div>

<div class="container">
    <h3>Withdrawal Requests</h3>
    <div id="withdrawalList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyBh-J9LAYeCfxNoKw9C94gbCqVhELofuoo",
    authDomain: "inrpay-44413.firebaseapp.com",
    projectId: "inrpay-44413"
});
const db = getFirestore(app);

// --- Cloudinary Integration ---
var myWidget = cloudinary.createUploadWidget({
    cloudName: 'dmxbt7fbt', 
    uploadPreset: 'inrpay_preset'
}, (error, result) => { 
    if (!error && result && result.event === "success") { 
        document.getElementById("qrUrl").value = result.info.secure_url;
        document.getElementById("qrPreview").src = result.info.secure_url;
        document.getElementById("qrPreview").style.display = "block";
        alert("QR Uploaded!");
    }
});

document.getElementById("upload-btn").addEventListener("click", () => myWidget.open(), false);

// --- Settings Logic ---
window.updateSettings = async () => {
    const upi = document.getElementById("upi").value;
    const notice = document.getElementById("notice").value;
    const qr = document.getElementById("qrUrl").value;
    const amount = document.getElementById("amount").value;

    const data = {};
    if(upi) data.upi = upi;
    if(notice) data.notice = notice;
    if(qr) data.qr = qr;
    if(amount) data.amount = amount;

    try {
        await setDoc(doc(db, "settings", "main"), data, { merge: true });
        alert("Settings Updated!");
        location.reload();
    } catch(e) { alert(e.message); }
};

// --- Load Dashboard Data ---
async function loadPanelData() {
    // 1. Load User Referral Stats (New Logic)
    const usersSnap = await getDocs(collection(db, "users"));
    const refList = document.getElementById("referralStatsList");
    refList.innerHTML = "";

    const allUsers = [];
    usersSnap.forEach(u => allUsers.push({ id: u.id, ...u.data() }));

    allUsers.forEach(user => {
        const referrals = allUsers.filter(u => u.referredBy == user.uid.toString());
        const count = referrals.length;
        const refNames = referrals.map(r => r.name).join(", ") || "None";

        refList.innerHTML += `
            <div class="list-item">
                <span><b>User:</b> ${user.name} (${user.id})</span>
                <span><b>Total Referrals:</b> <span class="ref-count">${count}</span></span>
                <span class="ref-details"><b>Referral Names:</b> ${refNames}</span>
            </div>`;
    });

    // 2. Load Deposits
    const depSnap = await getDocs(collection(db, "deposits"));
    const depList = document.getElementById("depositList");
    depList.innerHTML = "";
    depSnap.forEach(d => {
        const item = d.data();
        depList.innerHTML += `
            <div class="list-item">
                <span><b>User:</b> ${item.user}</span>
                <span><b>UTR:</b> ${item.utr}</span>
                <span><b>Status:</b> ${item.status}</span>
                ${item.status === "Pending" ? `<button class="action-btn" onclick="approveDeposit('${d.id}')">Approve UTR</button>` : ""}
            </div>`;
    });

    // 3. Load Withdrawals
    const withSnap = await getDocs(collection(db, "withdrawals"));
    const withList = document.getElementById("withdrawalList");
    withList.innerHTML = "";
    if(withSnap.empty) withList.innerHTML = "<p>No withdrawal requests.</p>";
    withSnap.forEach(d => {
        const item = d.data();
        if(item.status === "Pending") {
            withList.innerHTML += `
                <div class="list-item" style="border-left-color: #e91e63;">
                    <span><b>User:</b> ${item.user}</span>
                    <span><b>Amount:</b> ₹${item.amount}</span>
                    <span><b>Date:</b> ${item.date}</span>
                    <button class="action-btn" style="background:#e91e63" onclick="approveWithdrawal('${d.id}')">Mark Paid</button>
                </div>`;
        }
    });
}

// --- Action Functions ---
window.approveDeposit = async (id) => {
    if(confirm("Confirm this deposit approval?")) {
        await updateDoc(doc(db, "deposits", id), { status: "Approved" });
        alert("Deposit Verified!");
        loadPanelData();
    }
};

window.approveWithdrawal = async (id) => {
    if(confirm("Mark this withdrawal as completed?")) {
        await updateDoc(doc(db, "withdrawals", id), { status: "Done" });
        alert("Withdrawal Marked as Paid!");
        loadPanelData();
    }
};

loadPanelData();
</script>
</body>
</html>
